<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="all-content">

        <nav class="main-sidebar">
            <div>Something here</div>
            <div>Something else here</div>
            <div>A third thing here</div>
            <div>The final thing here</div>
        </nav>

        <section class="main-content">
            <form id="to-do-form" style="display: none;">
                <div>
                    <label for="title"> Enter title:</label>
                    <input type="text" name="title" id="title" required />
                </div>
                <div>
                    <label for="description">Enter desc:</label>
                    <input type="text" name="description" id="description"/>
                </div>
                <div>
                    <label for="due-date">Enter due-date:</label>
                    <input type="date" name="dueDate" id="due-date"/>
                </div>
                <div>
                    <fieldset>
                        <legend>Priority</legend>

                        <label>
                            <input type="radio" name="priority" value="High"/>
                            High
                        </label>
                        
                        <label>
                            <input type="radio" name="priority" value="Medium"/>
                            Medium
                        </label>

                        <label>
                            <input type="radio" name="priority" value="Low"/>
                            Low
                        </label>

                    </fieldset>
                </div>
                <div>
                    <label for="checklist">Enter checklist items:</label>
                    <input type="text" name="checklist" id="checklist"/>
                </div>
                <div>
                    <input type="submit" value="Enter">
                </div>
            </form>
            <footer class="footer-nav">
                <div>
                    <button type="button" class="new-to-do">Add To-Do item</button>
                </div>
                <div>Search for a to-do</div>
            </footer>
        </section>
    </main>
</body>
</html>
