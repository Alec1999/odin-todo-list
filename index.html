<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="all-content">
        <nav class="main-sidebar">
            <div>Somehting here</div>
            <div>Something else here</div>
            <div>A third thing here</div>
            <div>The final thing here</div>
        </nav>
        <div class="main-content">
            <div class="to-do-item">
                <div class="to-do-title">Title</div>
                <div class="to-do-desc">Description here</div>
                <div class="to-do-due-date">Due date here</div>
                <div class="to-do-priority">Priority here</div>
                <div class="to-do-checklist">Checklist here</div>
            </div>
            <form id="to-do-form" style="display: none;">
                <div>
                    <label for="title"> Enter title:</label>
                    <input type="text" name="title" id="title" required />
                </div>
                <div>
                    <label for="description">Enter Disc:</label>
                    <input type="text" name="description" id="description"/>
                </div>
                <div>
                    <label for="due-date">Enter due-date:</label>
                    <input type="text" name="due-date" id="due-date"/>
                </div>
                <div>
                    <label for="priority">Enter priority:</label>
                    <input type="text" name="priority" id="priority"/>
                </div>
                <div>
                    <label for="checklist">Enter checklist items:</label>
                    <input type="text" name="checklist" id="checklist"/>
                </div>
                <div>
                    <input type="submit" value="Enter">
                </div>
            </form>
            <footer class="footer-nav">
                <div>
                    <button type="button" class="new-to-do">Add To-Do item</button>
                </div>
                <div>Search for a to-do</div>
            </footer>
        </div>
    </main>
</body>
</html>
